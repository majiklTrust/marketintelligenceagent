<body>

  <!-- Blocking overlay for content generation -->
  <div id="generate-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center;">

  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  <style>

    .composer-cancel { align-self: center; }

    .composer-block-body { padding: 0.7rem 0.8rem; }
    .composer-block-line { font-size: 0.82rem; color: #7f1d1d; margin-bottom: 0.45rem; line-height: 1.5; }
    .composer-block-note { font-size: 0.76rem; color: #9a3412; background: #fff7ed; border-radius: 4px; padding: 0.45rem 0.6rem; margin-top: 0.5rem; line-height: 1.45; }
    .composer-fidelity-ok { font-size: 0.8rem; font-weight: 600; color: #15803d; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 4px; padding: 0.45rem 0.6rem; margin-bottom: 0.6rem; }
    .composer-fidelity-keys { font-size: 0.72rem; font-weight: 400; color: #4d7c5a; margin-top: 0.2rem; word-break: break-word; }
  </style>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const API = '';  // same-origin
    const DASHBOARD_POLL_INTERVAL_MS = 15000;
    const TIER_ORDER = { authoritative: 0, primary: 1, secondary: 2 };

    // ── Dynamic topic colors — deterministic hash from slug ──
    const TOPIC_PALETTE = [
      { color: '#3b82f6', bg: 'rgba(59,130,246,0.15)' },
      { color: '#8b5cf6', bg: 'rgba(139,92,246,0.15)' },
      { color: '#ef4444', bg: 'rgba(239,68,68,0.15)' },
      { color: '#06b6d4', bg: 'rgba(6,182,212,0.15)' },
      { color: '#10b981', bg: 'rgba(16,185,129,0.15)' },
      { color: '#f59e0b', bg: 'rgba(245,158,11,0.15)' },
    ];

    function hashSlug(slug) {
      let h = 0;
      for (let i = 0; i < (slug || '').length; i++) {
        h = ((h << 5) - h + slug.charCodeAt(i)) | 0;
      }
      return Math.abs(h);
    }

    function humanizeSlug(slug) {
      return (slug || '').split('-').map(function(w) {
        return w.charAt(0).toUpperCase() + w.slice(1);
      }).join(' ');
    }

    function getTopicStyle(slug) {
      const p = TOPIC_PALETTE[hashSlug(slug) % TOPIC_PALETTE.length];
      return { color: p.color, bg: p.bg, label: humanizeSlug(slug) };
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      try {
        const raw = String(dateStr);
        const d = new Date(raw.endsWith('Z') ? raw : raw + 'Z');
        if (isNaN(d.getTime())) return '—';
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        return '—';
      }
    }

    // Which date to show for a post. A SCHEDULED post must show WHEN it will
    // publish (scheduled_for), not when it was created. A posted one shows
    // posted_at. formatDate already renders in the viewer's local timezone.
    function postDisplayDate(post) {
      if (!post) return '—';
      if (post.status === 'scheduled' && post.scheduled_for) return formatDate(post.scheduled_for);
      if (post.posted_at) return formatDate(post.posted_at);
      return formatDate(post.created_at);
    }

    // Perform a mutating request and throw on a non-OK response so callers
    // surface the failure instead of silently treating it as success.
    async function mutate(url, opts) {
      const res = await fetch(url, opts);
      if (!res.ok) {
        let detail = res.status;
        try { const body = await res.json(); if (body && body.error) detail = body.error; } catch (e) {}
        throw new Error('Request failed (' + detail + ')');
      }
      return res;
    }

    function parseNewsContext(post) {
      if (!post.news_context) return null;
      try { return typeof post.news_context === 'string' ? JSON.parse(post.news_context) : post.news_context; }
      catch { return null; }
    }

    function getPrimarySource(post) {
      const ctx = parseNewsContext(post);
      const ps = ctx && ctx.primarySource;
      // Defense in depth behind server-side validation: render only http(s).
      if (!ps || typeof ps.url !== 'string' || !/^https?:\/\//.test(ps.url)) return null;
      return ps;
    }

    function getArticleImages(post) {
      if (post.articleImages && post.articleImages.length > 0) return post.articleImages;
      const ctx = parseNewsContext(post);
      if (ctx && ctx.articleImages && ctx.articleImages.length > 0) return ctx.articleImages;
      return [];
    }

    function getCorroborationLevel(ctx) {
      if (!ctx || !ctx.researchSummary) return 'none';
      if (ctx.researchSummary.corroborationSkipped) return 'skipped';
      const v = ctx.researchSummary.verifiedClaims || 0;
      if (v >= 3) return 'strong';
      if (v >= 1) return 'weak';
      return 'none';
    }

    const CORROB_LABELS = {
      strong: { cls: 'corroboration-strong', text: 'Well corroborated' },
      weak: { cls: 'corroboration-weak', text: 'Limited corroboration' },
      skipped: { cls: 'corroboration-weak', text: 'Corroboration skipped' },
      none: { cls: 'corroboration-none', text: 'Uncorroborated' },
    };

    // ── Composer — Create a post (1.9.31) ────────────────────
    // Create-only: topic + angle + a clean, metric-free genre
    // picker. Generates a draft via /api/compose/generate (which
    // PERSISTS it server-side) and hands the result to the shared
    // post-detail modal through onGenerated. The genre catalog is
    // platform-level and topic-independent, so it loads once on
    // mount; the internal 'refine' genre is excluded server-side.
    // Metric fidelity is out of scope for this flow by design —
    // no landscape, no metric preview, no fidelity panel.
    function Composer({ API, topics, onClose, onGenerated, onNewDraft }) {
      const [topicSlug, setTopicSlug] = useState('');
      const [angle, setAngle] = useState('');
      const [genres, setGenres] = useState([]);
      const [selectedGenre, setSelectedGenre] = useState('');
      const [genresLoading, setGenresLoading] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const abortRef = React.useRef(null);
      const cancelKindRef = React.useRef(null);
      const mountedRef = React.useRef(true);

      // Genre catalog is platform-level and topic-independent — load
      // it once on mount. Read only name + description; the server
      // already excludes the internal refine genre, and any metric
      // flags it returns are ignored here. If 'default' isn't present
      // for some reason, fall back to the first genre so a card is
      // always visibly selected.
      useEffect(() => {
        let cancelled = false;
        setGenresLoading(true);
        setError(null);
        fetch(`${API}/api/compose/genres`)
          .then(r => r.json())
          .then(data => {
            if (cancelled) return;
            const list = Array.isArray(data.genres) ? data.genres : [];
            setGenres(list.map(g => ({ genre: g.genre, description: g.description })));
            setSelectedGenre(prev =>
              list.some(g => g.genre === prev) ? prev : (list[0] ? list[0].genre : 'default'));
            setGenresLoading(false);
          })
          .catch(err => {
            if (cancelled) return;
            setError('Failed to load genres: ' + err.message);
            setGenresLoading(false);
          });
        return () => { cancelled = true; };
      }, []);

      // Lifecycle: abort any in-flight generation when the Composer
      // unmounts (operator closed it mid-request). Prevents both a
      // dangling request and a state update on an unmounted component.
      // mountedRef gates every post-await setState in handleGenerate.
      useEffect(() => {
        mountedRef.current = true;
        return () => {
          mountedRef.current = false;
          if (abortRef.current) {
            cancelKindRef.current = 'unmount';
            abortRef.current.abort();
          }
        };
      }, []);

      // Operator-initiated abort of an in-flight generation. The reason
      // is recorded before abort() so the catch can distinguish a user
      // cancel from a timeout or an unmount.
      function handleCancel() {
        if (abortRef.current) {
          cancelKindRef.current = 'user';
          abortRef.current.abort();
        }
      }

      const topic = topics.find(t => t.slug === topicSlug);
      const angles = (topic && Array.isArray(topic.content_angles))
        ? topic.content_angles.filter(a => typeof a === 'string' && a.trim())
        : [];

      async function handleGenerate() {
        if (loading) return; // double-submit guard (button is also disabled)

        const controller = new AbortController();
        abortRef.current = controller;
        cancelKindRef.current = null;
        // Client-side backstop: the AI pipeline can outlast the gateway
        // timeout. Abort after a ceiling above it so the UI never hangs
        // indefinitely if no response (or error page) arrives.
        const timeoutId = setTimeout(() => {
          cancelKindRef.current = 'timeout';
          controller.abort();
        }, 90000);

        setLoading(true);
        setError(null);
        try {
          const res = await fetch(`${API}/api/compose/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topicId: topicSlug || undefined, angle: angle || undefined, genre: selectedGenre }),
            signal: controller.signal
          });

          // A gateway timeout or proxy error is typically HTML, not JSON.
          // Parse defensively so we never surface a raw JSON-parse error.
          let data = null;
          const ctype = res.headers.get('content-type') || '';
          if (ctype.indexOf('application/json') !== -1) {
            try { data = await res.json(); } catch (e) { data = null; }
          }

          if (!res.ok) {
            const serverMsg = data && data.error ? data.error : null;
            const gateway = res.status === 502 || res.status === 503 || res.status === 504;
            throw new Error(serverMsg
              || (gateway
                ? 'The generation timed out or the service was briefly unavailable. The AI pipeline can exceed the gateway limit under load — please try again.'
                : 'Generation failed (server returned ' + res.status + ').'));
          }
          if (!data) {
            throw new Error('The server returned an unexpected response. Please try again.');
          }

          // A fidelity or no-source stop saves nothing and comes back as
          // { blocked, reason }. Surface the reason inline — no separate
          // panel; this flow doesn't deal in metric tokens.
          if (data.blocked) {
            if (mountedRef.current) setError(data.reason || 'The draft was withheld by a quality check. Please try again.');
            return;
          }

          // Success: the server has PERSISTED this as a draft (postId).
          // Hand it to the shared post-detail modal — same review/edit/
          // Queue-for-Approval path as the Generate (Preview) button — and
          // let the parent close the Composer.
          if (mountedRef.current) onGenerated(data);
        } catch (err) {
          if (err && err.name === 'AbortError') {
            const kind = cancelKindRef.current;
            if (kind !== 'unmount' && mountedRef.current) {
              setError(kind === 'timeout'
                ? 'Generation timed out. The AI pipeline can exceed the gateway limit under load — please try again.'
                : 'Generation cancelled.');
            }
          } else if (mountedRef.current) {
            setError((err && err.message) || 'Generation failed.');
          }
        } finally {
          clearTimeout(timeoutId);
          if (abortRef.current === controller) abortRef.current = null;
          cancelKindRef.current = null;
          if (mountedRef.current) setLoading(false);
        }
      }

      async function handleNewPost() {
        setError(null);
        try {
          const res = await fetch(`${API}/api/compose/blank`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });
          const data = await res.json();
          if (res.ok && data.post) {
            onNewDraft(data.post);
          } else if (mountedRef.current) {
            setError(data.error || 'Could not create a blank post.');
          }
        } catch (err) {
          if (mountedRef.current) setError((err && err.message) || 'Could not create a blank post.');
        }
      }

      return (
        <div className="composer-overlay" onClick={loading ? undefined : onClose}>
          <div className="composer-modal" onClick={e => e.stopPropagation()}>
            <div className="composer-head">
              <h2 className="composer-title">Create a post</h2>
              <button className="composer-close" onClick={onClose}>✕</button>
            </div>

            {selectedGenre !== '' && (
              <React.Fragment>
                <label className="composer-label">Topic</label>
                <select className="topic-selector" value={topicSlug}
                  onChange={e => { setTopicSlug(e.target.value); setAngle(''); }}>
                  <option value="">Auto-select topic</option>
                  {topics.filter(t => t.enabled !== false).map(t => (
                    <option key={t.id} value={t.slug}>{t.name}</option>
                  ))}
                </select>

                {topicSlug && angles.length > 0 && (
                  <React.Fragment>
                    <label className="composer-label">Angle</label>
                    <select className="topic-selector" value={angle}
                      onChange={e => setAngle(e.target.value)}>
                      <option value="">Auto-select angle</option>
                      {angles.map(a => <option key={a} value={a}>{a}</option>)}
                    </select>
                  </React.Fragment>
                )}
              </React.Fragment>
            )}

            <label className="composer-label">Genre</label>
            {genresLoading ? (
              <div className="composer-note">Loading genres…</div>
            ) : (
              <div className="composer-genres">
                <label className={`composer-genre${selectedGenre === '' ? ' selected' : ''}`}>
                  <input type="radio" name="composer-genre" value=""
                    checked={selectedGenre === ''}
                    onChange={() => setSelectedGenre('')} />
                  <span className="composer-genre-main">
                    <span className="composer-genre-name">no genre</span>
                    <span className="composer-genre-desc">Start from a blank canvas and write the post yourself.</span>
                  </span>
                </label>
                {genres.map(g => (
                  <label key={g.genre}
                    className={`composer-genre${selectedGenre === g.genre ? ' selected' : ''}`}>
                    <input type="radio" name="composer-genre" value={g.genre}
                      checked={selectedGenre === g.genre}
                      onChange={() => setSelectedGenre(g.genre)} />
                    <span className="composer-genre-main">
                      <span className="composer-genre-name">{g.genre}</span>
                      {g.description && <span className="composer-genre-desc">{g.description}</span>}
                    </span>
                  </label>
                ))}
              </div>
            )}

            {error && <div className="composer-error">{error}</div>}

            {loading ? (
              <div className="composer-actions">
                <button className="btn btn-primary btn-full" disabled>
                  <span className="loading-spinner"></span> Generating…
                </button>
                <button className="btn btn-ghost composer-cancel" onClick={handleCancel}>Cancel</button>
              </div>
            ) : (
              <button className="btn btn-primary btn-full" onClick={selectedGenre === '' ? handleNewPost : handleGenerate} disabled={genresLoading}>
                {selectedGenre === '' ? 'New Post' : 'Generate with AI'}
              </button>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [status, setStatus] = useState(null);
      const [posts, setPosts] = useState([]);
      const [logs, setLogs] = useState([]);
      const [selectedPost, setSelectedPost] = useState(null);
      const [loading, setLoading] = useState({});
      const [error, setError] = useState(null);
      const [selectedTopic, setSelectedTopic] = useState('');
      const [selectedAngle, setSelectedAngle] = useState('');
      const [topics, setTopics] = useState([]);
      const [editingPost, setEditingPost] = useState(null);
      const [imageChoice, setImageChoice] = useState({ mode: 'none', url: null });
      const [showSchedule, setShowSchedule] = useState(false);
      const [scheduleAt, setScheduleAt] = useState('');
      const [editFields, setEditFields] = useState({ title: '', content: '', hashtags: '' });
      const [showComposer, setShowComposer] = useState(false);
      const [showComingSoon, setShowComingSoon] = useState(false);

      const authFetch = useCallback(async (url, opts) => {
        const res = await fetch(url, opts);
        if (res.status === 401) {
          window.location.href = '/auth/login';
          throw new Error('Authentication required');
        }
        return res;
      }, []);

      const fetchAll = useCallback(async (opts) => {
        const bgHeaders = opts?.background ? { 'X-Background-Poll': '1' } : {};
        try {
          // Status is public (uses optionalAuth) — always fetch with regular fetch
          const statusRes = await fetch(`${API}/api/status`, { headers: bgHeaders }).then(r => r.json());

          // If auth is required and no user, don't fetch protected routes
          if (statusRes.authRequired && !statusRes.user) {
            setStatus(statusRes);
            setPosts([]);
            setLogs([]);
            setError(null);
            return;
          }

          // Authenticated but no tenant — user.role is null when
          // findTenantByAuthIdentity returns no membership. Set status
          // with the RAW response (stats stays null) so the no-tenant
          // panel renders. Do NOT apply safe defaults or fetch protected
          // routes — every one of them will 403 without a tenant.
          if (statusRes.user && !statusRes.user.role) {
            setStatus(statusRes);
            setPosts([]);
            setLogs([]);
            setError(null);
            return;
          }

          // Safe defaults for new tenants with no agent_state rows.
          // Without this, status.mode.toUpperCase() crashes when
          // the tenant exists but has never set a mode.
          // These ONLY run when a tenant exists (role is non-null above).
          if (!statusRes.mode) statusRes.mode = 'manual';
          if (!statusRes.stats) statusRes.stats = {
            totalPosted: 0, postsLast10Days: 0, pendingApproval: 0, byTopic: []
          };

          setStatus(statusRes);

          const [postsRes, logsRes] = await Promise.all([
            authFetch(`${API}/api/posts?limit=30`, { headers: bgHeaders }).then(r => r.json()),
            authFetch(`${API}/api/logs?limit=40`, { headers: bgHeaders }).then(r => r.json()),
          ]);
          setPosts(postsRes.posts || []);
          setLogs(logsRes.logs || []);

          // Fetch topics for the selector — 403 is expected for viewers
          try {
            const topicsRes = await fetch(`${API}/api/topics`, { headers: bgHeaders }).then(r => r.ok ? r.json() : null);
            const topicsList = (topicsRes && topicsRes.topics) || [];
            setTopics(topicsList);

            // New tenant with zero topics → steer to Topics manager,
            // but ONLY if the topics API responded successfully (topicsRes
            // is truthy — a 403 sets it to null) AND the user's role can
            // actually manage topics. Without both checks, viewers loop:
            //   dashboard (empty topics) → /app/topics/ (403) → dashboard
            // TEMPORARILY DISABLED — zero-topic redirect to Topics manager
            // const role = statusRes.user?.role;
            // if (topicsRes && topicsList.length === 0 &&
            //     (role === 'owner' || role === 'editor')) {
            //   window.location.href = '/app/topics/';
            //   return;
            // }
          } catch { setTopics([]); }
          setError(null);
        } catch (err) {
          if (err.message !== 'Authentication required') {
            setError('Service temporarily unavailable. Please try again shortly.');
          }
        }
      }, [authFetch]);

      useEffect(() => {
        fetchAll();
        const interval = setInterval(() => fetchAll({ background: true }), DASHBOARD_POLL_INTERVAL_MS);
        return () => clearInterval(interval);
      }, [fetchAll]);

      async function toggleMode() {
        const newMode = status.mode === 'auto' ? 'manual' : 'auto';
        try {
          await mutate(`${API}/api/mode`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode: newMode })
          });
          fetchAll();
        } catch (err) {
          alert('Failed to change mode: ' + err.message);
        }
      }

      async function handleApprove(id, e) {
        e.stopPropagation();
        setLoading(l => ({ ...l, [`approve-${id}`]: true }));
        try {
          await mutate(`${API}/api/posts/${id}/approve`, { method: 'POST' });
          fetchAll();
        } catch (err) {
          alert('Failed to approve: ' + err.message);
        }
        setLoading(l => ({ ...l, [`approve-${id}`]: false }));
      }

      async function handleApproveWithImage(id, e) {
        e.stopPropagation();
        setLoading(l => ({ ...l, [`approve-${id}`]: true }));
        try {
          // Resolve the image URL based on user's choice
          let finalImageUrl = null;
          if (imageChoice.mode === 'auto' && imageChoice.url) {
            finalImageUrl = imageChoice.url;
          } else if (imageChoice.mode === 'custom' && imageChoice.url) {
            finalImageUrl = imageChoice.url.trim();
          }

          // Determine if image_url changed from the post's current value
          const currentUrl = selectedPost?.image_url || null;
          if (finalImageUrl !== currentUrl) {
            const patchRes = await fetch(`${API}/api/posts/${id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ image_url: finalImageUrl })
            });
            if (!patchRes.ok) {
              const patchErr = await patchRes.json().catch(() => ({}));
              throw new Error(patchErr.error || 'Failed to update image');
            }
          }

          // Now approve
          await mutate(`${API}/api/posts/${id}/approve`, { method: 'POST' });
          setSelectedPost(null);
          setImageChoice({ mode: 'none', url: null });
          fetchAll();
        } catch (err) {
          alert('Failed to approve: ' + err.message);
        }
        setLoading(l => ({ ...l, [`approve-${id}`]: false }));
      }

      async function handleReject(id, e) {
        e.stopPropagation();
        try {
          await mutate(`${API}/api/posts/${id}/reject`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reason: 'Manually rejected from dashboard' })
          });
          fetchAll();
        } catch (err) {
          alert('Failed to reject: ' + err.message);
        }
      }

      // Discard a draft: delete the persisted row, then close + refresh.
      // A DB-loaded draft carries `id`; a preview carries `draftPostId`
      // (the row saved at generation). If neither is present nothing was
      // persisted, so just close the modal.
      async function handleDiscard(post, e) {
        if (e) e.stopPropagation();
        const id = post.id || post.draftPostId;
        if (!id) { setSelectedPost(null); return; }
        try {
          await mutate(`${API}/api/posts/${id}`, { method: 'DELETE' });
          setSelectedPost(null);
          fetchAll();
        } catch (err) {
          alert('Failed to discard: ' + err.message);
        }
      }

      // Rewrite with AI: one-click, in-place refinement of the open post's
      // existing copy. No modal, no inputs — the server uses the post's own
      // topic, angle, saved genre, and stored research as context and the
      // metric-free 'refine' prompt to tighten the draft. A pending post
      // drops to draft on the server; a preview keeps its (already-draft)
      // row. Works for a DB-loaded draft/pending post (id) or a freshly
      // generated preview (draftPostId).
      async function handleRewrite(post, e) {
        if (e) e.stopPropagation();
        const id = post.id || post.draftPostId;
        if (!id) return;
        setLoading(l => ({ ...l, rewrite: true }));
        try {
          const res = await fetch(`${API}/api/posts/${id}/rewrite`, { method: 'POST' });
          const data = await res.json();
          if (!res.ok || !data.success) {
            throw new Error(data.error || `Rewrite failed (server returned ${res.status})`);
          }
          // Patch the open modal in place. For a DB-loaded post the refine
          // forced status to draft, so reflect that; a preview is gated by
          // isPreview (not status), so leave its status untouched.
          setSelectedPost(sp => sp ? {
            ...sp,
            title: data.post.title,
            content: data.post.content,
            hashtags: data.post.hashtags || [],
            status: sp.isPreview ? sp.status : (data.post.status || 'draft')
          } : sp);
          fetchAll();
        } catch (err) {
          alert('Rewrite failed: ' + err.message);
        } finally {
          setLoading(l => ({ ...l, rewrite: false }));
        }
      }

      function openEditModal(post, e) {
        if (e) e.stopPropagation();
        setEditingPost(post);
        setEditFields({
          title: post.title || '',
          content: post.content || '',
          hashtags: (post.hashtags || []).join(', ')
        });
      }

      async function handleSaveEdit() {
        if (!editingPost) return;
        const hashtags = editFields.hashtags.split(',').map(h => h.trim()).filter(Boolean);

        // A fresh preview is a 'draft' (not pending_approval) whose db id lives
        // in draftPostId, so it cannot be edited via PATCH. Apply the edits to
        // the in-memory preview; "Queue for Approval" then persists them via
        // save-preview, which updates the draft and promotes it.
        if (editingPost.isPreview) {
          setSelectedPost(sp => sp ? {
            ...sp,
            title: editFields.title,
            content: editFields.content,
            hashtags
          } : sp);
          setEditingPost(null);
          return;
        }

        // Queued (pending_approval) post: persist immediately via PATCH.
        setLoading(l => ({ ...l, editSave: true }));
        try {
          const res = await fetch(`${API}/api/posts/${editingPost.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: editFields.title,
              content: editFields.content,
              hashtags
            })
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || 'Failed to save');
          }
          const updated = { ...editingPost, title: editFields.title, content: editFields.content, hashtags };
          setEditingPost(null);
          setSelectedPost(updated);
          fetchAll();
        } catch (err) {
          alert('Save failed: ' + err.message);
        }
        setLoading(l => ({ ...l, editSave: false }));
      }

      async function handleForceCycle() {
        setLoading(l => ({ ...l, forceCycle: true }));
        try {
          await mutate(`${API}/api/force-cycle`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topicId: selectedTopic || undefined })
          });
          setTimeout(fetchAll, 2000);
        } catch (err) {
          alert('Failed to start cycle: ' + err.message);
        } finally {
          setLoading(l => ({ ...l, forceCycle: false }));
        }
      }

      async function handlePreview() {
        setLoading(l => ({ ...l, preview: true }));
        // Show blocking overlay
        const overlay = document.getElementById('generate-overlay');
        if (overlay) overlay.style.display = 'flex';
        try {
          const res = await fetch(`${API}/api/generate-preview`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topicId: selectedTopic || undefined, angle: selectedAngle || undefined })
          });
          const data = await res.json();

          if (!res.ok || data.error) {
            throw new Error(data.error || `Server returned ${res.status}`);
          }

          if (data.blocked) {
            alert(`A post could not be generated at this time.\nReason: ${data.reason}\n\nTopic: ${getTopicStyle(data.topicId).label}\nAngle: ${data.angle}\n\nThe agent will try a different topic and angle next cycle.`);
            setLoading(l => ({ ...l, preview: false }));
            if (overlay) overlay.style.display = 'none';
            return;
          }

          setSelectedPost({
            ...data.post,
            quality: data.quality,
            isPreview: true,
            draftPostId: data.postId,
            title: data.post.title,
            content: data.post.content,
            hashtags: data.post.hashtags,
            topic_id: data.post.topicId,
            articleImages: data.post.articleImages || [],
            news_context: JSON.stringify({
              sourcesUsed: data.post.sourcesUsed || [],
              researchSummary: data.post.researchSummary || null,
              qualityScores: data.quality?.scores,
              factualFlags: data.quality?.factual_flags,
              articleImages: data.post.articleImages || []
            })
          });
          setImageChoice({ mode: 'none', url: null });
        } catch (err) {
          alert('Preview generation failed: ' + err.message);
        }
        setLoading(l => ({ ...l, preview: false }));
        if (overlay) overlay.style.display = 'none';
      }

      // Composer success handoff. The composed post is already PERSISTED
      // as a draft server-side (data.postId); open it in the same
      // post-detail modal the Preview button uses so edit + Queue for
      // Approval behave identically. Composed posts additionally carry a
      // genre and a fidelity summary, surfaced in the modal.
      function handleNewDraftResult(post) {
        setShowComposer(false);
        setEditingPost(post);
        setEditFields({
          title: post.title || '',
          content: post.content || '',
          hashtags: (post.hashtags || []).join(', ')
        });
      }

      function handleComposerResult(data) {
        setSelectedPost({
          ...data.post,
          quality: data.quality,
          isPreview: true,
          draftPostId: data.postId,
          genre: data.genre,
          fidelity: data.fidelity || null,
          title: data.post.title,
          content: data.post.content,
          hashtags: data.post.hashtags,
          topic_id: data.post.topicId,
          articleImages: data.post.articleImages || [],
          news_context: JSON.stringify({
            sourcesUsed: data.post.sourcesUsed || [],
            researchSummary: data.post.researchSummary || null,
            qualityScores: data.quality?.scores,
            factualFlags: data.quality?.factual_flags,
            articleImages: data.post.articleImages || []
          })
        });
        setImageChoice({ mode: 'none', url: null });
        setShowComposer(false);
      }

      async function handleRefreshFeeds() {
        setLoading(l => ({ ...l, feeds: true }));
        try {
          await mutate(`${API}/api/research/poll`, { method: 'POST' });
          fetchAll();
        } catch (err) {
          alert('Feed refresh failed: ' + err.message);
        }
        setLoading(l => ({ ...l, feeds: false }));
      }

      async function toggleCorroboration() {
        setLoading(l => ({ ...l, corroboration: true }));
        const current = status.corroboration || 'enabled';
        const newValue = current === 'enabled' ? false : true;
        try {
          await fetch(`${API}/api/corroboration`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled: newValue })
          });
          await fetchAll();
        } catch (err) {
          alert('Toggle failed: ' + err.message);
        }
        setLoading(l => ({ ...l, corroboration: false }));
      }

      async function handleSavePreview() {
        if (!selectedPost || (!selectedPost.isPreview && selectedPost.status !== 'draft')) return;
        setLoading(l => ({ ...l, savePreview: true }));
        try {
          // Resolve image URL from user's choice
          let selectedImageUrl = null;
          if (imageChoice.mode === 'auto' && imageChoice.url) {
            selectedImageUrl = imageChoice.url;
          } else if (imageChoice.mode === 'custom' && imageChoice.url) {
            selectedImageUrl = imageChoice.url.trim();
          }

          const res = await fetch(`${API}/api/save-preview`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              postId: selectedPost.draftPostId || selectedPost.id || null,
              topicId: selectedPost.topic_id,
              title: selectedPost.title,
              content: selectedPost.content,
              hashtags: selectedPost.hashtags,
              angle: selectedPost.angle,
              sourcesUsed: selectedPost.sourcesUsed,
              researchSummary: selectedPost.researchSummary,
              quality: selectedPost.quality,
              imageUrl: selectedImageUrl,
              articleImages: selectedPost.articleImages || []
            })
          });
          const data = await res.json();
          if (data.success) {
            setSelectedPost(null);
            fetchAll();
          } else {
            alert('Save failed: ' + (data.error || 'Unknown error'));
          }
        } catch (err) {
          alert('Save failed: ' + err.message);
        }
        setLoading(l => ({ ...l, savePreview: false }));
      }

      // Default picker value = next top-of-hour in LOCAL time, formatted
      // as datetime-local wants ("YYYY-MM-DDTHH:mm", no timezone).
      function nextHourLocal() {
        const d = new Date(Date.now() + 60 * 60 * 1000);
        d.setMinutes(0, 0, 0);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
      }

      // Save-then-transition: persist current editor content, then move the
      // post to the chosen pre-publication status via the generic endpoint.
      // For 'scheduled', datetime-local is LOCAL wall-clock with no zone;
      // new Date() parses it as local and toISOString() sends UTC. The server
      // re-validates legality (canTransition) and, for scheduling, the time.
      async function handleStatusChange(to) {
        if (!selectedPost) return;
        const id = selectedPost.draftPostId || selectedPost.id;
        if (!id) { alert('This post has not been saved yet.'); return; }

        const body = {
          to,
          title: selectedPost.title,
          content: selectedPost.content,
          hashtags: selectedPost.hashtags
        };
        let selectedImageUrl = null;
        if (imageChoice.mode === 'auto' && imageChoice.url) {
          selectedImageUrl = imageChoice.url;
        } else if (imageChoice.mode === 'custom' && imageChoice.url) {
          selectedImageUrl = imageChoice.url.trim();
        }
        body.imageUrl = selectedImageUrl;

        if (to === 'scheduled') {
          if (!scheduleAt) { alert('Pick a date and time first.'); return; }
          const whenUtc = new Date(scheduleAt);
          if (isNaN(whenUtc.getTime())) { alert('That date/time is not valid.'); return; }
          if (whenUtc.getTime() <= Date.now()) { alert('Scheduled time must be in the future.'); return; }
          body.scheduledFor = whenUtc.toISOString();
        }

        setLoading(l => ({ ...l, statusChange: true }));
        try {
          const res = await fetch(`${API}/api/posts/${id}/status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const data = await res.json();
          if (res.ok && data.success) {
            setShowSchedule(false);
            setScheduleAt('');
            setSelectedPost(null);
            fetchAll();
          } else {
            alert('Status change failed: ' + (data.error || `server returned ${res.status}`));
          }
        } catch (err) {
          alert('Status change failed: ' + err.message);
        }
        setLoading(l => ({ ...l, statusChange: false }));
      }

      const pendingPosts = posts.filter(p => p.status === 'pending_approval' || p.status === 'draft');
      const recentPosts = posts.filter(p => p.status !== 'pending_approval' && p.status !== 'draft');

      // ── Login Wall: shown when auth is required but no user ──
      if (status && status.authRequired && !status.user) {
        return (
          <div className="app-container">
            <div className="login-wall">
              <div className="login-wall-title">Market Intelligence</div>
              <div className="login-wall-subtitle">Authentication required to access the dashboard</div>
              <a href="/auth/login" className="login-btn">Log In</a>
            </div>
          </div>
        );
      }

      if (error) {
        return (
          <div className="app-container">
            <div className="header">
              <div>
                <div className="header-title">Market Intelligence</div>
                <div className="header-subtitle">Command Center</div>
              </div>
            </div>
            <div className="sidebar-panel state-panel">
              <div className="state-icon">⚡</div>
              <div className="state-warning">
                Service Unavailable
              </div>
              <div className="text-muted-sm">{error}</div>
            </div>
          </div>
        );
      }

      if (!status) {
        return (
          <div className="app-container loading-center">
            <div className="loading-spinner loading-spinner-lg"></div>
          </div>
        );
      }

      // ── No-Tenant Panel ──────────────────────────────────────
      // Authenticated user with no workspace assignment. The
      // /api/status endpoint returns tenant-scoped fields as null
      // when findTenantByAuthIdentity finds no membership for the
      // user's sub. Without this guard, the main render below
      // crashes on status.mode.toUpperCase() (line ~322) and
      // status.stats.totalPosted (line ~332).
      //
      // This is a legitimate state — new sign-ups exist before
      // tenant provisioning. Backlog: dedicated /no-tenant route
      // would give a stable URL for tenant-provisioning emails.
      if (status.user && status.stats === null) {
        return (
          <div className="app-container">
            <div className="header">
              <div>
                <div className="header-title">Market Intelligence</div>
                <div className="header-subtitle">v1.9.35</div>
              </div>
              <div className="header-controls-wide">
                <a href="/" className="btn btn-ghost btn-nav">Home</a>
                <div className="user-info">
                  <span className="user-name">{status.user.name || status.user.email || status.user.sub}</span>
                  <a href="/auth/logout" className="logout-btn">Logout</a>
                </div>
              </div>
            </div>
            <div className="sidebar-panel state-panel-mt">
              <div className="state-icon">🔐</div>
              <div className="state-warning">
                No Membership - Workspace Unassigned
              </div>
              <div className="text-muted-sm" style={{ maxWidth: '32rem', margin: '0 auto' }}>
                Your account is authenticated but isn't yet assigned to a workspace.
                Contact your administrator to be added to one, then log out and back in.
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="app-container">
          {/* Dev Mode Banner */}
          {status && !status.authRequired && (
            <div className="dev-banner">
              <span className="dev-banner-icon">⚠</span>
              <div>
                <div>Authentication Disabled</div>
                <div className="dev-banner-detail">NODE_ENV=dev{status.serverAddress ? '  APP_SERVER=' + status.serverAddress : ''}</div>
              </div>
            </div>
          )}
          {/* Header */}
          <div className="header">
            <div>
              <div className="header-title">Market Intelligence</div>
              <div className="header-subtitle">v1.9.35 · {status.linkedinConnected ? `connected as ${status.linkedinProfile}` : 'linkedin not connected'}</div>
            </div>
            <div className="header-controls">
              {status?.user && (
                <div className="user-info">
                  <span className="user-name">{status.user.name || status.user.email || status.user.sub}</span>
                  <a href="/auth/logout" className="logout-btn">Logout</a>
                </div>
              )}
              <a href="/" className="btn btn-ghost btn-nav">Home</a>
              {(status?.user?.role === 'owner' || status?.user?.role === 'editor') && (
                <a href="/app/topics/" className="btn btn-ghost btn-nav">Topics</a>
              )}
              {status?.user?.role === 'owner' && !status.devBypass && (
                <a href="/app/admin/" className="btn btn-ghost btn-nav">Manage Users</a>
              )}
            <div className="mode-switch">
              <span className="mode-label">Mode</span>
              <div className={`toggle-track ${status.mode === 'auto' ? 'active' : ''}`} onClick={toggleMode}>
                <div className="toggle-thumb"></div>
              </div>
              <span className={`mode-value ${status.mode === 'auto' ? 'mode-auto' : 'mode-manual'}`}>
                {status.mode === 'auto' ? 'AGENTIC' : 'MANUAL'}
              </span>
            </div>
            </div>
          </div>

          {/* Stats */}
          <div className="stats-grid">
            <div className="stat-card">
              <div className="stat-label">Total Published</div>
              <div className="stat-value">{status.stats.totalPosted}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Posts (10-day)</div>
              <div className="stat-value">{status.stats.postsLast10Days}</div>
              <div className="cadence-bar">
                <div className="cadence-fill" style={{
                  width: `${(status.stats.postsLast10Days / (status.maxPostsPer10Days || 4)) * 100}%`,
                  background: status.stats.postsLast10Days >= (status.maxPostsPer10Days || 4) ? 'var(--accent-amber)' : 'var(--accent-green)'
                }}></div>
              </div>
              <div className="stat-meta">max {status.maxPostsPer10Days || 4} {status.cadence?.allowed ? '— ready to post' : `— ${status.cadence?.reason?.substring(0, 30)}`}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Pending Approval</div>
              <div className="stat-value">
                {status.stats.pendingApproval}
              </div>
            </div>
            <div className="stat-card">
              <div className="stat-label">LinkedIn</div>
              <div className="stat-value stat-value-sm">
                <span className={`conn-dot conn-dot-inline ${status.linkedinConnected ? 'connected' : 'disconnected'}`}></span>
                {status.linkedinConnected ? 'Connected' : 'Not Connected'}
              </div>
              {!status.linkedinConnected && (
                <div className="stat-meta">
                  <a href="/auth/linkedin" className="text-link-blue">Connect now →</a>
                </div>
              )}
            </div>
          </div>

          {/* Main content */}
          <div className="main-grid">
            {/* Posts column */}
            <div>
              {/* Pending approval section */}
              {pendingPosts.length > 0 && (
                <div className="mb-2">
                  <div className="section-title">
                    Awaiting Approval
                    <span className="badge">{pendingPosts.filter(p => p.status === 'pending_approval').length}</span>
                    {pendingPosts.some(p => p.status === 'draft') && (
                      <span className="badge badge-draft-ml">
                        {pendingPosts.filter(p => p.status === 'draft').length} draft{pendingPosts.filter(p => p.status === 'draft').length !== 1 ? 's' : ''}
                      </span>
                    )}
                  </div>
                  <div className="post-list">
                    {pendingPosts.map(post => {
                      const pCtx = parseNewsContext(post);
                      const pLevel = getCorroborationLevel(pCtx);
                      const pLabel = CORROB_LABELS[pLevel];
                      const pSource = getPrimarySource(post);
                      return (
                      <div key={post.id} className="post-card pending-card" onClick={() => {
                        setSelectedPost(post);
                        setImageChoice(post.image_url ? { mode: 'auto', url: post.image_url } : { mode: 'none', url: null });
                      }}>
                        <div className="post-card-header">
                          <div className="post-badges-row">
                            <span className="post-topic-badge" style={{ background: getTopicStyle(post.topic_id).bg, color: getTopicStyle(post.topic_id).color }}>
                              {getTopicStyle(post.topic_id).label}
                            </span>
                            <span className={`corroboration-badge ${pLabel.cls}`}>
                              {pLevel === 'strong' ? '◉' : pLevel === 'weak' ? '◎' : '○'} {pLabel.text}
                            </span>
                          </div>
                          <span className={post.status === 'draft'
                            ? 'post-status badge-draft'
                            : 'post-status status-pending_approval'}>
                            {post.status === 'draft' ? 'DRAFT' : 'PENDING'}
                          </span>
                        </div>
                        <div className="post-title-text">{post.title}</div>
                        <div className="post-preview">{post.content}</div>
                        <div className="post-footer">
                          <div className="post-meta">
                            <span className="post-date">{postDisplayDate(post)}</span>
                            {pSource && (<a href={pSource.url} target="_blank" rel="noopener noreferrer nofollow" className="source-url" onClick={(e) => e.stopPropagation()}>via {pSource.domain}</a>)}
                          </div>

                              >

                            </button>

                      <select className="topic-selector" value={selectedAngle}

                      </select>

                  })()}

                  <div className="toggle-row">
                    <span className={`toggle-label ${loading.corroboration ? 'toggle-label-inactive' : (status.corroboration || 'enabled') === 'enabled' ? 'toggle-label-active' : 'toggle-label-inactive'}`}>
                      {loading.corroboration ? 'Working...' : `Corroboration ${(status.corroboration || 'enabled') === 'enabled' ? 'ON' : 'OFF'}`}
                    </span>
                    <label className={`toggle-switch ${loading.corroboration ? 'toggle-busy' : ''}`}>
                      <input type="checkbox"
                        checked={(status.corroboration || 'enabled') === 'enabled'}
                        onChange={toggleCorroboration}
                        disabled={loading.corroboration} />
                      <span className="toggle-track"></span>
                    </label>
                  </div>
                  <button
                    className={`btn ${(status.mode || 'manual') === 'auto' ? 'btn-primary' : 'btn-ghost'}`}
                    style={{
                      width: '100%',
                      ...((status.mode || 'manual') !== 'auto' ? { opacity: 0.5, cursor: 'not-allowed', pointerEvents: 'none' } : {})
                    }}
                    onClick={handleForceCycle}
                    disabled={(status.mode || 'manual') !== 'auto'}
                    title={(status.mode || 'manual') !== 'auto' ? 'Switch to Agentic mode to enable' : 'Run one scheduler cycle now'}
                  >
                    {loading.forceCycle ? <span className="loading-spinner"></span> : '⟳ Force Scheduler Cycle'}
                  </button>
                </div>
              </div>

              {/* Research Monitor */}
              <div className="sidebar-panel">
                <div className="section-title section-title-flush">Research Monitor <span className="section-title-meta">(<span className="highlight-cyan">{status.researchStats?.byFeed?.length || 0}</span> feeds)</span></div>
                <div className="research-meta">
                  using <span className="highlight-cyan">{status.researchStats?.recentArticles || 0}</span> articles · last <span className="highlight-cyan">{status.researchStats?.maxAgeDays || 20}</span> days
                </div>
                {status.researchStats ? (
                  <div>
                    <div className="feed-list-scroll">
                      {(status.researchStats.byFeed || []).slice(0, status.feedLimit || 8).map((f, i) => (
                        <div key={i} className="feed-row">
                          <span className="feed-name">
                            {f.feed_name}
                          </span>
                          <div className="feed-meta">
                            <span className={`source-tier tier-${f.feed_tier} feed-tier-sm`}>{{ authoritative: 'auth', primary: 'prim', secondary: 'sec' }[f.feed_tier] || f.feed_tier}</span>
                            <span className="feed-count">
                              {f.count}
                            </span>
                          </div>
                        </div>
                      ))}

                    <button className="btn btn-primary btn-refresh-full btn-tight"
                      onClick={handleRefreshFeeds}>
                      {loading.feeds ? <span className="loading-spinner"></span> : '↻ Refresh Feeds Now'}
                    </button>
                  </div>
                ) : (
                  <div className="text-muted-sm">Monitor starting...</div>
                )}
              </div>

              {/* Topic Coverage */}
              <div className="sidebar-panel">
                <div className="section-title">Topic Coverage</div>
                {(status.stats.byTopic || []).map(t => (

                    <div className="topic-row">
                      <span className="post-topic-badge topic-badge-sm" style={{ background: getTopicStyle(t.topic_id).bg, color: getTopicStyle(t.topic_id).color }}>
                        {getTopicStyle(t.topic_id).label}
                      </span>
                      <span className="mono-muted-sm">
                        {t.count} posts
                      </span>
                    </div>
                  </div>
                ))}
                {(!status.stats.byTopic || status.stats.byTopic.length === 0) && (
                  <div className="text-muted-sm">No posts yet</div>
                )}
              </div>
            </div>

            {/* Activity Log (right column) */}
            <div>
              <div className="sidebar-panel">
                <div className="section-title">Activity Log</div>
                <div className="log-scroll">
                  {logs.slice(0, 30).map(log => {
                    let cycleId = null;
                    let detail = '';
                    try {
                      const d = typeof log.details === 'string' ? JSON.parse(log.details) : log.details;
                      if (d) {
                        if (d.cycleId) cycleId = d.cycleId;
                        // Build contextual detail from known actions
                        if (d.feed) {
                          detail = d.feed;
                          if (d.status != null) detail += ' · ' + d.status;
                          if (d.newArticles > 0) detail += ' · ' + d.newArticles + ' new';
                          if (d.linked > 0) detail += ' · ' + d.linked + ' linked';
                          if (d.error) detail += ' · ' + d.error.split('\n')[0];
                        } else if (d.feedCount != null) {
                          detail = d.feedCount + ' feeds';
                        } else if (d.newArticles != null && d.prunedLinks != null) {
                          detail = d.newArticles + ' new · ' + d.linked + ' linked · ' + d.prunedLinks + ' pruned';
                        } else if (d.postId) {
                          detail = 'post #' + d.postId;
                          if (d.title) detail += ' · ' + d.title.substring(0, 40);
                        } else if (d.topicSlug || d.slug) {
                          detail = d.topicSlug || d.slug;

            // (gated by isPreview, id lives in draftPostId) or a DB-loaded
            // draft / pending_approval post. Anything else (approved,
            // published, rejected) is not refinable, matching the server.
            const rewriteId = selectedPost.id || selectedPost.draftPostId;
            const rewritable = !!rewriteId && (selectedPost.isPreview
              || selectedPost.status === 'draft'
              || selectedPost.status === 'pending_approval');
            const moveId = selectedPost.id || selectedPost.draftPostId;
            const movable = !!moveId && (selectedPost.isPreview
              || selectedPost.status === 'draft'
              || selectedPost.status === 'pending_approval'
              || selectedPost.status === 'scheduled');

                <div className="post-badges-wrap">
                  <span className="post-topic-badge" style={{ background: getTopicStyle(selectedPost.topic_id).bg, color: getTopicStyle(selectedPost.topic_id).color }}>

                  {selectedPost.isPreview && (
                    <span className="post-status status-preview">PREVIEW</span>

                  {!selectedPost.isPreview && selectedPost.status === 'draft' && (
                    <span className="post-status badge-draft">DRAFT</span>

                  {!selectedPost.isPreview && selectedPost.status === 'scheduled' && (
                    <span className="post-status" style={{ background: 'rgba(56,189,248,0.18)', color: '#38bdf8' }}>SCHEDULED</span>
                  )}
                  {selectedPost.news_context && (
                    <span className={`corroboration-badge ${corrobLabel.cls}`}>
                      {corrobLevel === 'strong' ? '◉' : corrobLevel === 'weak' ? '◎' : '○'} {corrobLabel.text}
                    </span>
                  )}
                </div>

                <h3 className="modal-heading">{selectedPost.title}</h3>

                {!selectedPost.isPreview && selectedPost.status === 'scheduled' && selectedPost.scheduled_for && (
                  <div className="schedule-banner" style={{ margin: '0.5rem 0', padding: '0.55rem 0.75rem', borderRadius: 6, background: 'rgba(56,189,248,0.12)', border: '1px solid rgba(56,189,248,0.35)', fontSize: '0.88rem' }}>
                    🗓️ Scheduled to publish <strong>{formatDate(selectedPost.scheduled_for)}</strong> · your local time
                  </div>
                )}

                {/**selectedPost.fidelity && (
                  <div className="composer-fidelity-ok">
                    {Array.isArray(selectedPost.fidelity.usedMetricKeys) && selectedPost.fidelity.usedMetricKeys.length > 0
                      ? '✓ Fidelity verified — ' + selectedPost.fidelity.usedMetricKeys.length + ' verified metric' + (selectedPost.fidelity.usedMetricKeys.length === 1 ? '' : 's') + ' locked into this post'
                      : selectedPost.fidelity.metricsAvailable > 0
                        ? '✓ Fidelity verified — no metric figures were used in this post'
                        : '✓ Fidelity verified'}
                    {selectedPost.genre && selectedPost.genre !== 'default' ? ' · genre: ' + selectedPost.genre : ''}
                    {selectedPost.fidelity.strict ? ' · strict number-policing on' : ''}
                    {Array.isArray(selectedPost.fidelity.usedMetricKeys) && selectedPost.fidelity.usedMetricKeys.length > 0 && (
                      <div className="composer-fidelity-keys">{selectedPost.fidelity.usedMetricKeys.join(', ')}</div>
                    )}
                  </div>
                )**/}

                {ctx?.researchSummary && (
                  <div className="research-summary">
                    <span className="research-stat"><strong>{ctx.researchSummary.verifiedClaims}</strong> verified claims</span>
                    <span className="research-stat"><strong>{ctx.researchSummary.independentSources}</strong> independent sources</span>
                    <span className="research-stat"><strong>{ctx.researchSummary.totalSourceItems}</strong> source items</span>
                    <span className="research-stat"><strong>{ctx.researchSummary.sourceList?.length || 0}</strong> cited</span>
                  </div>
                )}

                {ctx?.primarySource && ctx.primarySource.url && (
                  <div className="primary-source">
                    <span className="primary-source-label">Primary source:</span>{' '}
                    <a href={ctx.primarySource.url} target="_blank" rel="noopener noreferrer nofollow" className="source-url">{ctx.primarySource.name} — via {ctx.primarySource.domain}</a>
                  </div>
                )}
                <div className="modal-body">{selectedPost.content}</div>
                <div className="modal-hashtags">
                  {(selectedPost.hashtags || []).map((tag, i) => (
                    <span key={i} className="hashtag">{tag}</span>
                  ))}
                </div>

                {rewritable && (
                  <div className="modal-rewrite" style={{ margin: '0.75rem 0' }}>
                    <button className="btn btn-primary btn-tight" onClick={(e) => handleRewrite(selectedPost, e)} disabled={!!loading.rewrite || !(selectedPost.content || '').trim()}>
                      {loading.rewrite ? <span className="loading-spinner"></span> : '✦ Rewrite with AI'}
                    </button>
                  </div>
                )}

                {movable && (
                  <div className="modal-move" style={{ margin: '0.75rem 0', paddingTop: '0.5rem', borderTop: '1px solid rgba(255,255,255,0.08)' }}>
                    <div style={{ fontSize: '0.78rem', opacity: 0.7, marginBottom: '0.4rem' }}>Move this post to:</div>
                    <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap', alignItems: 'center' }}>
                      {currStatus !== 'draft' && (
                        <button className="btn btn-tight" onClick={() => handleStatusChange('draft')} disabled={!!loading.statusChange}>
                          ✎ Draft

                      {currStatus !== 'pending_approval' && currStatus !== 'draft' && (
                        <button className="btn btn-tight" onClick={() => handleStatusChange('pending_approval')} disabled={!!loading.statusChange || !(selectedPost.content || '').trim()}>
                          ⏳ Queue for Approval
                        </button>

                      <button
                        className="btn btn-tight"
                        onClick={() => { setScheduleAt(prev => prev || nextHourLocal()); setShowSchedule(s => !s); }}
                        disabled={!!loading.statusChange}
                      >
                        🗓️ {currStatus === 'scheduled' ? 'Reschedule' : 'Schedule'}
                      </button>
                    </div>
                    {showSchedule && (
                      <div className="schedule-picker" style={{ marginTop: '0.6rem', display: 'flex', alignItems: 'center', gap: '0.5rem', flexWrap: 'wrap' }}>
                        <input
                          type="datetime-local"
                          value={scheduleAt}
                          min={nextHourLocal()}
                          onChange={e => setScheduleAt(e.target.value)}
                          style={{ padding: '0.35rem 0.5rem' }}
                        />
                        <button className="btn btn-primary btn-tight" onClick={() => handleStatusChange('scheduled')} disabled={!!loading.statusChange || !(selectedPost.content || '').trim()}>
                          {loading.statusChange ? <span className="loading-spinner"></span> : 'Confirm time'}
                        </button>
                        <button className="btn btn-tight" onClick={() => setShowSchedule(false)} disabled={!!loading.statusChange}>
                          Cancel
                        </button>
                        <span style={{ fontSize: '0.78rem', opacity: 0.7, width: '100%' }}>
                          Publishes at the time shown, in your local timezone. Saves current edits first.
                        </span>
                      </div>
                    )}
                  </div>
                )}

                {ctx?.researchSummary?.sourceList && ctx.researchSummary.sourceList.length > 0 && (
                  <div className="source-list">
                    <div className="section-heading-cyan">
                      Sources ({ctx.researchSummary.sourceList.length})
                    </div>
                    {[...ctx.researchSummary.sourceList]
                      .sort((a, b) => (TIER_ORDER[a.tier] ?? 99) - (TIER_ORDER[b.tier] ?? 99))

                      <div key={i} className="source-item">
                        <div>
                          <span className="source-name">{src.name}</span>
                          {src.url && (<div><a href={src.url} target="_blank" rel="noopener" className="source-url">{src.url}</a></div>)}
                        </div>
                        <span className={`source-tier tier-${src.tier}`}>{src.tier}</span>
                      </div>

                  </div>

                {!ctx?.researchSummary?.sourceList && ctx?.sourcesUsed && ctx.sourcesUsed.length > 0 && (
                  <div className="source-list">
                    <div className="section-heading-cyan">Sources Referenced</div>
                    {ctx.sourcesUsed.map((name, i) => (
                      <div key={i} className="source-item"><span className="source-name">{name}</span></div>
                    ))}
                  </div>
                )}

                {ctx?.factualFlags && ctx.factualFlags.length > 0 && ctx.factualFlags[0] !== '' && (
                  <div className="factual-flags">
                    <div className="section-heading-red">
                      Factual Flags — Review Before Approving
                    </div>
                    {ctx.factualFlags.map((flag, i) => (
                      <div key={i} className="flag-item"><span>⚠</span><span>{flag}</span></div>
                    ))}

                )}

                {(() => {
                  // Quality panel source: live preview carries

                  // omitted rather than erroring.
                  let quality = selectedPost.quality;
                  if (!quality) {
                    const qs = ctx?.qualityScores;
                    if (qs && Object.keys(qs).length > 0) {
                      quality = { scores: qs, overall: ctx?.qualityOverall, pass: ctx?.qualityPass };
                    }
                  }
                  return quality ? (
                  <div className="quality-panel">
                    <div className="section-heading-plain">Quality Assessment</div>
                    {Object.entries(quality.scores || {}).map(([key, val]) => (
                      <div key={key} className="quality-row">
                        <span className="quality-label">
                          {key.replace(/_/g, ' ')}
                        </span>
                        <div className="quality-bar">
                          <div style={{
                            width: `${val * 10}%`, height: '100%', borderRadius: '3px',
                            background: val >= 7 ? 'var(--accent-green)' : val >= 5 ? 'var(--accent-amber)' : 'var(--accent-red)'
                          }}></div>
                        </div>
                        <span className="quality-score">{val}</span>
                      </div>
                    ))}
                    <div className="quality-overall">
                      Overall: <strong style={{ color: quality.pass ? 'var(--accent-green)' : 'var(--accent-amber)' }}>
                        {quality.overall}/10 {quality.pass ? '✓ Pass' : '⚠ Needs work'}
                      </strong>
                    </div>
                  </div>
                  ) : null;
                })()}
                {selectedPost.status === 'pending_approval' && (() => {
                  const availableImages = getArticleImages(selectedPost);
                  return (
                  <div>
                    <div className="section-divider">
                      <div className="section-heading">
                        Post Image{status?.publishMode !== 'image-posting' && (
                          <span className="fw-normal"> - text posting only</span>
                        )}
                      </div>
                      <div className="detail-stack">
                        <label className="image-choice-inline">
                          <input type="radio" name="image-choice" value="none"
                            defaultChecked={!selectedPost.image_url && imageChoice.mode === 'none'}
                            onChange={() => setImageChoice({ mode: 'none', url: null })} />
                          No image
                        </label>
                        {availableImages.map((img, idx) => (
                          <label key={idx} className="image-choice">
                            <input type="radio" name="image-choice" value={`article-${idx}`}
                              defaultChecked={selectedPost.image_url === img.imageUrl}
                              onChange={() => setImageChoice({ mode: 'auto', url: img.imageUrl })} />
                            <div className="flex-1">
                              <div className="text-edit-sm">{img.feedName || 'Article image'}</div>
                              <img src={`/api/image-proxy?url=${encodeURIComponent(img.imageUrl)}`}
                                alt={img.title || 'Article image'}
                                className="image-thumb"
                                onError={(e) => { e.target.style.display = 'none'; }} />
                              <input type="text" readOnly value={img.imageUrl}
                                className="image-url-field"
                                onClick={(e) => e.target.select()} />
                            </div>
                          </label>
                        ))}
                        {availableImages.length === 0 && selectedPost.image_url && (
                          <label className="image-choice">
                            <input type="radio" name="image-choice" value="auto"
                              defaultChecked={!!selectedPost.image_url}
                              onChange={() => setImageChoice({ mode: 'auto', url: selectedPost.image_url })} />
                            <div className="flex-1">
                              <div className="text-edit-sm">Current image</div>
                              <img src={`/api/image-proxy?url=${encodeURIComponent(selectedPost.image_url)}`}
                                alt="Post image"
                                className="image-thumb-lg"
                                onError={(e) => { e.target.style.display = 'none'; }} />
                              <input type="text" readOnly value={selectedPost.image_url}
                                className="image-url-field"
                                onClick={(e) => e.target.select()} />
                            </div>
                          </label>
                        )}
                        <label className="image-choice">
                          <input type="radio" name="image-choice" value="custom"
                            onChange={() => setImageChoice({ mode: 'custom', url: '' })} />
                          <div className="flex-1">
                            Custom image URL
                            <input type="text" placeholder="https://example.com/image.jpg"
                              className="image-url-field"
                              onChange={(e) => setImageChoice({ mode: 'custom', url: e.target.value })}
                              onClick={() => { document.querySelector('input[name="image-choice"][value="custom"]').checked = true; }} />
                          </div>
                        </label>
                      </div>
                    </div>
                    <div className="modal-actions">
                      <button className="btn btn-approve" onClick={(e) => { handleApproveWithImage(selectedPost.id, e); }}>
                        Publish
                      </button>
                      <button className="btn btn-reject" onClick={(e) => { handleReject(selectedPost.id, e); setSelectedPost(null); }}>
                        Reject
                      </button>
                      <button className="btn btn-edit" onClick={(e) => { openEditModal(selectedPost, e); setSelectedPost(null); }}>
                        Edit
                      </button>
                    </div>
                  </div>
                  );})()}
                {(selectedPost.isPreview || selectedPost.status === 'draft') && (() => {
                  const availableImages = getArticleImages(selectedPost);
                  return (
                  <div>
                    <div className="section-divider">
                      <div className="section-heading">
                        Attach Image (optional){status?.publishMode !== 'image-posting' && (
                          <span className="fw-normal"> - text posting only</span>
                        )}
                      </div>
                      <div className="detail-stack">
                        <label className="image-choice-inline">
                          <input type="radio" name="preview-image-choice" value="none"
                            defaultChecked={imageChoice.mode === 'none'}
                            onChange={() => setImageChoice({ mode: 'none', url: null })} />
                          No image
                        </label>
                        {availableImages.map((img, idx) => (
                          <label key={idx} className="image-choice">
                            <input type="radio" name="preview-image-choice" value={`article-${idx}`}
                              onChange={() => setImageChoice({ mode: 'auto', url: img.imageUrl })} />
                            <div className="flex-1">
                              <div className="text-edit-sm">{img.feedName || 'Article image'}</div>
                              <img src={`/api/image-proxy?url=${encodeURIComponent(img.imageUrl)}`}
                                alt={img.title || 'Article image'}
                                className="image-thumb"
                                onError={(e) => { e.target.style.display = 'none'; }} />
                              <input type="text" readOnly value={img.imageUrl}
                                className="image-url-field"
                                onClick={(e) => e.target.select()} />
                            </div>
                          </label>
                        ))}
                        <label className="image-choice">
                          <input type="radio" name="preview-image-choice" value="custom"
                            onChange={() => setImageChoice({ mode: 'custom', url: '' })} />
                          <div className="flex-1">
                            Custom image URL
                            <input type="text" placeholder="https://example.com/image.jpg"
                              className="image-url-field"
                              onChange={(e) => setImageChoice({ mode: 'custom', url: e.target.value })}
                              onClick={() => { document.querySelector('input[name="preview-image-choice"][value="custom"]').checked = true; }} />
                          </div>
                        </label>
                      </div>
                    </div>
                    <div className="modal-actions">
                      <button className="btn btn-approve" onClick={handleSavePreview} disabled={loading.savePreview || !(selectedPost.content || '').trim()}>
                        {loading.savePreview ? <span className="loading-spinner"></span> : 'Queue for Approval'}
                      </button>
                      <button className="btn btn-edit" onClick={(e) => { openEditModal(selectedPost, e); }}>
                        Edit
                      </button>
                      <button className="btn btn-reject" onClick={(e) => handleDiscard(selectedPost, e)}>
                        Discard
                      </button>
                    </div>
                  </div>
                  );})()}
                <button className="btn btn-ghost modal-close-bottom" onClick={() => setSelectedPost(null)}>✕ Close</button>
              </div>
            </div>
            );
          })()}

          {/* Edit Post Modal */}
          {editingPost && (
            <div className="modal-overlay" onClick={() => setEditingPost(null)}>
              <div className="modal-content" onClick={e => e.stopPropagation()} style={{ maxWidth: '600px' }}>
                <button className="modal-close" onClick={() => setEditingPost(null)}>✕</button>
                <h3 className="modal-heading-top">Edit Post</h3>
                <div className="mb-075">
                  <label className="form-label">Title</label>
                  <input type="text" value={editFields.title}
                    onChange={e => setEditFields(f => ({ ...f, title: e.target.value }))}
                    className="form-input" />
                </div>
                <div className="mb-075">
                  <label className="form-label">Content</label>
                  <textarea value={editFields.content}
                    onChange={e => setEditFields(f => ({ ...f, content: e.target.value }))}
                    rows={10}
                    className="form-textarea" />
                </div>
                <div className="mb-1">
                  <label className="form-label">Hashtags (comma-separated)</label>
                  <input type="text" value={editFields.hashtags}
                    onChange={e => setEditFields(f => ({ ...f, hashtags: e.target.value }))}
                    className="form-input" />
                </div>
                <div className="modal-actions-end">
                  <button className="btn btn-ghost" onClick={() => setEditingPost(null)}>Cancel</button>
                  <button className="btn btn-approve" onClick={handleSaveEdit} disabled={loading.editSave}>
                    {loading.editSave ? <span className="loading-spinner"></span> : 'Save Changes'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false };
      }
      static getDerivedStateFromError() {
        return { hasError: true };
      }
      componentDidCatch(error, info) {
        console.error('Dashboard render error:', error, info);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{ padding: '2rem', textAlign: 'center' }}>
              <h2>Something went wrong.</h2>
              <p>The dashboard hit an unexpected error and could not render this view.</p>
              <button className="btn btn-approve" onClick={() => window.location.reload()}>Reload dashboard</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    ReactDOM.render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>,
      document.getElementById('root')
    );
  </script>
</body>
</html>
